<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Pixelify+Sans:wght@400..700&family=Tiny5&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <title>Intro</title>
</head>

<body>

<div class="wrapper">

  <div class="circle">
    <div class="title">Hey</div>
  </div>

  <div class="introsection">
    <div class="intro">
      Me is Hex4Gr1m who is a creative developer and I love building unique games in Unity,
      experimenting with visualss, and turning simple ideas into stupid experiences.
    </div>
  </div>
  
  <div class="logo-section">
  <div class="logo-circle">
    <img src="logo.png" class="logo-img" alt="logo">
  </div>
</div>


</div>

<style>

body {
  background-color: red;
  color: white;
  margin: 0;
  padding: 0;
  overflow-y: auto;
  transition: 0.3s ease;
  animation: pageEnter 0.8s ease-out forwards;
}

@keyframes pageEnter {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

body:has(.circle:hover) {
  background-color: white;
}
body:has(.circle:hover),
body:has(.logo-circle:hover) {
  background-color: white;
}

.wrapper {
  min-height: 150vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
}


.circle {
  margin-top: 30vh;
  background-color: white;
  color: red;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: 0.3s ease;
}


.circle::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: white;
  filter: blur(25px);
  z-index: -1;
  transition: 0.3s ease;
}


.circle:hover {
  background-color: red;
  color: white;
}

.circle:hover::before {
  background: red;
}


.title {
  font-size: 90px;
  font-family: "Pacifico", cursive;
}

.introsection {
  margin-top: 60px;
  width: 100%;
  display: flex;
  justify-content: center;
  padding-bottom: 100px;
}

.intro {
  font-family: "Pacifico", cursive;
  font-size: 20px;
  text-align: center;
  width: 60%;
  opacity: 0.85;
  color:red;
}
.logo-section {
  width: 100%;
  display: flex;
  justify-content: center;
  margin-top: 80px;
  padding-bottom: 120px;
}

.logo-circle {
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background-color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;
  transition: 0.3s ease;
}


.logo-circle::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: white;
  filter: blur(25px);
  z-index: -1;
  transition: 0.3s ease;
}

.logo-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
  opacity: 0;
  transition: 0.3s ease;
}


.logo-circle:hover {
  background-color: red;
}

.logo-circle:hover::before {
  background: red;
}

.logo-circle:hover .logo-img {
  opacity: 1;
}


</style>

</body>
</html>
